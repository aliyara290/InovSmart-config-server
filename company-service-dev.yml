spring:
  application:
    name: company-service

  datasource:
    url: jdbc:postgresql://localhost:5433/company_db
    username: aliyara29
    password: Yara2001
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/InovSmart
          jwk-set-uri: http://localhost:8080/realms/InovSmart/protocol/openid-connect/certs

keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://localhost:8090}
  realm: ${KEYCLOAK_REALM:InovSmart}
  admin:
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    client-secret: ${KEYCLOAK_ADMIN_SECRET:admin}

internal:
  api-key: ${INTERNAL_API_KEY:internal}

invitation:
  expiry-hours: ${INVITATION_EXPIRY_HOURS:48}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
