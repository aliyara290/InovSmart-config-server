spring:
  application:
    name: company-service

  datasource:
    url: jdbc:postgresql://localhost:5433/company_db
    username: aliyara29
    password: Yara2001
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8090/realms/InovSmart
          jwk-set-uri: http://localhost:8090/realms/InovSmart/protocol/openid-connect/certs

keycloak:
  base-url: http://localhost:8090
  realm: InovSmart
  admin:
    client-id: company-client
    client-secret: 2q0ORY9t1UnTwBmLaTpxaJg9Y8xzymIV

internal:
  api-key: internal

invitation:
  expiry-hours: 48

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,refresh, beans
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.aliyara.companyservice: DEBUG
