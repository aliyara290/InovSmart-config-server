spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/billing_db}
    username: aliyara29
    password: Yara2001
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

    jpa:
      hibernate:
        ddl-auto: validate
      show-sql: false
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8090/realms/InovSmart/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

logging:
  level:
    com.aliyara.billingservice: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,beans,refresh
  endpoint:
    health:
      show-details: when_authorized
